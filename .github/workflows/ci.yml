name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  test:
    name: Build & test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build
        run: cargo build --verbose
      - name: Test (single-threaded decode)
        run: cargo test --verbose
      # Hard gate: multithreaded decode is bit-exact with single-threaded as of #19.
      - name: Differential test (multithreaded decode)
        run: cargo test --test differential_md5 --verbose
        env:
          CRABVPX_THREADS: 4

  lint:
    name: Format & clippy (advisory)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      # Non-blocking for now: the decoder core is c2rust-derived and not yet
      # fully idiomatic. These surface the cleanup backlog without gating CI.
      - name: rustfmt
        run: cargo fmt --all -- --check
        continue-on-error: true
      - name: clippy
        run: cargo clippy --all-targets
        continue-on-error: true

  bench:
    name: Benchmarks compile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # Compile-only: confirms benches build. Run `cargo bench` locally for numbers.
      - name: Build benches
        run: cargo bench --no-run

  fuzz:
    name: Fuzz targets smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz --locked
      # Building the targets is a real, always-on compile gate.
      - name: Build fuzz targets
        run: cargo fuzz build
      # The earlier known crashes (DC-only IDCT dequant overflow #21,
      # frame-buffer alloc failure #20, truncated-partition underflow #22) are
      # fixed. The smoke run stays advisory because a hostile keyframe can
      # legitimately declare spec-max dimensions (up to 16383x16383) and exceed
      # rss_limit with a single (fallible, graceful) allocation, and because
      # fuzzing may always surface new findings.
      - name: Smoke run (decode_frame)
        run: cargo fuzz run decode_frame -- -runs=20000 -max_total_time=60 -rss_limit_mb=2048
        continue-on-error: true

  msrv:
    name: MSRV (1.88)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Hard gate: the crate must build and pass on its declared
      # rust-version (Cargo.toml), not just current stable.
      - uses: dtolnay/rust-toolchain@1.88
      - uses: Swatinem/rust-cache@v2
      - name: Build
        run: cargo build --verbose
      - name: Test
        run: cargo test --verbose

  miri:
    name: Miri (leaf logic)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: miri, rust-src
      - uses: Swatinem/rust-cache@v2
      # Scoped to the safe-Rust leaf logic that is Miri-clean today. The full
      # decode path is excluded for now: it trips a pre-existing Stacked Borrows
      # violation in the frame-buffer pointer handling (`AlignedBox`/
      # `buffer_alloc`). Broaden to `cargo miri test` once that is fixed.
      - name: Miri (bool decoder)
        run: cargo miri test --test bool_decoder_test
